<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="geometricPrecision">
  <title>Caveman Web - stone tablet</title>
  <defs>
    <radialGradient id="stone" cx="38%" cy="32%" r="78%">
      <stop offset="0%"  stop-color="#5a4d40"/>
      <stop offset="55%" stop-color="#33291f"/>
      <stop offset="100%" stop-color="#1a140e"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7048"/>
      <stop offset="100%" stop-color="#3a2e1f"/>
    </linearGradient>
  </defs>

  <!-- chunky asymmetric stone -->
  <path d="M 22 18
           C 38 8, 78 6, 100 16
           C 118 24, 122 56, 116 86
           C 110 112, 86 122, 56 118
           C 26 114, 8 96, 10 66
           C 12 40, 14 26, 22 18 Z"
        fill="url(#stone)"
        stroke="url(#rim)"
        stroke-width="4"/>

  <!-- top highlight -->
  <ellipse cx="56" cy="32" rx="26" ry="7" fill="#7a6244" opacity="0.45"/>

  <!-- crack 1 -->
  <path d="M 38 36 L 58 62 L 50 84 L 64 96"
        stroke="#15100a" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- crack 2 -->
  <path d="M 84 50 L 92 70"
        stroke="#15100a" stroke-width="2.5" fill="none"
        stroke-linecap="round"/>

  <!-- pebble accent -->
  <circle cx="92" cy="92" r="4" fill="#15100a" opacity="0.7"/>
</svg>
